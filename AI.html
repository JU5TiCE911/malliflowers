<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Flower Search AI</title>
    <style>
        /* ВАШ ФИРМЕННЫЙ CSS */
        @font-face {
            font-family: 'Benzin';
            src: url('fonts/benzin-semibold.otf') format('opentype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #FF007A;
            --light-pink: #FFD1E8;
        }

        body {
            /* ДОБАВЛЕНО: Фон с вашей гифкой и легким фильтром для читаемости */
            background: linear-gradient(rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.5)),
                        url('images/gifka.GIF');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            font-family: 'Times New Roman', Times, serif;
            font-weight: normal;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(255, 255, 255); /* Слегка прозрачный хедер */
            border-bottom: 1px solid #eee;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo { height: 85px; width: auto; }

        .slogan {
            font-size: 14px;
            color: #888;
            max-width: 280px;
            line-height: 1.2;
            font-family: 'Times New Roman', Times, serif;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Кнопки в стиле каталога */
        .nav-links a, .lang-switch, .city-badge {
            text-decoration: none;
            color: var(--pink);
            font-family: 'Benzin', sans-serif !important;
            font-weight: bold;
            font-size: 13px;
            border: 1px solid var(--pink);
            padding: 7px 20px;
            border-radius: 50px;
            transition: 0.3s;
            background: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            text-transform: uppercase;
        }

        .nav-links a:hover, .lang-switch:hover {
            background: var(--pink);
            color: white !important;
        }

        .city-badge { appearance: none; outline: none; }

        /* ЦЕНТРАЛЬНЫЙ БЛОК ПОИСКА */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 100px;
        }

        .logo-text {
            font-family: 'Benzin', sans-serif !important;
            font-size: 56px;
            font-weight: bold;
            color: var(--pink);
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.8);
        }

        .search-container { width: 100%; max-width: 650px; }

        #main-search {
            width: 100%;
            padding: 20px 35px;
            font-size: 18px;
            border: 1px solid #dfe1e5;
            border-radius: 40px;
            outline: none;
            background: rgba(255, 255, 255, 0.95); /* Почти белый фон для поиска */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            font-family: 'Times New Roman', serif;
        }

        #main-search:focus {
            border-color: var(--pink);
            box-shadow: 0 10px 30px rgba(255, 0, 122, 0.2);
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <a href="index_ru.html">
                <img src="images/logo.png" class="logo" alt="Logo">
            </a>
            <div id="header-slogan" class="slogan">
                ПЕРВЫЙ ЦИФРОВОЙ ЦВЕТОЧНЫЙ МАГАЗИН В КАЗАХСТАНЕ
            </div>
        </div>

        <div class="nav-links">
            <a href="index_ru.html" id="nav-home">ГЛАВНАЯ</a>
            <a href="catalog.html" id="nav-catalog">КАТАЛОГ</a>
            <a href="about.html" id="nav-about">О КОМПАНИИ</a>
            <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">КАЗ</button>
            <select id="citySelect" class="city-badge">
                <option value="astana" id="opt-astana">АСТАНА</option>
                <option value="almaty" id="opt-almaty">АЛМАТЫ</option>
            </select>
        </div>
    </header>

    <div class="main-content">
        <div class="logo-text" id="main-logo">Гүлдер Әлемі AI</div>
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Кустовые розы для дня рождения до 35000 тг" onkeypress="handleSearch(event)">
        </div>
    </div>

    <script>
    let currentLang = 'ru';

    const translations = {
        ru: {
            slogan: "ПЕРВЫЙ ЦИФРОВОЙ ЦВЕТОЧНЫЙ МАГАЗИН В КАЗАХСТАНЕ",
            navHome: "ГЛАВНАЯ", navCatalog: "КАТАЛОГ", navAbout: "О КОМПАНИИ",
            langBtn: "КАЗ", cityAstana: "АСТАНА", cityAlmaty: "АЛМАТЫ",
            mainLogo: "Мир Цветов",
            placeholder: "Кустовые розы для дня рождения до 35000 тг"
        },
        kaz: {
            slogan: "ҚАЗАҚСТАНДАҒЫ ЕҢ АЛҒАШҚЫ ЦИФРЛАНДЫРЫЛҒАН ГҮЛ ДҮКЕНІ",
            navHome: "БАСТЫ БЕТ", navCatalog: "КАТАЛОГ", navAbout: "КОМПАНИЯ ТУРАЛЫ",
            langBtn: "РУС", cityAstana: "АСТАНА", cityAlmaty: "АЛМАТЫ",
            mainLogo: "Гүлдер Әлемі",
            placeholder: "Туған күнге арналған 35000 тг дейінгі бұталы розалар"
        }
    };

    function toggleLanguage() {
        currentLang = (currentLang === 'ru') ? 'kaz' : 'ru';
        applyTranslations();
    }

    function applyTranslations() {
        const t = translations[currentLang];
        document.getElementById('header-slogan').textContent = t.slogan;
        document.getElementById('nav-home').textContent = t.navHome;
        document.getElementById('nav-catalog').textContent = t.navCatalog;
        document.getElementById('nav-about').textContent = t.navAbout;
        document.getElementById('langBtn').textContent = t.langBtn;
        document.getElementById('opt-astana').textContent = t.cityAstana;
        document.getElementById('opt-almaty').textContent = t.cityAlmaty;
        document.getElementById('main-logo').textContent = t.mainLogo;
        document.getElementById('main-search').placeholder = t.placeholder;
    }

    // --- ОБНОВЛЕННАЯ ФУНКЦИЯ ПОИСКА ---
    function handleSearch(event) {
        if (event.key === 'Enter') {
            const query = document.getElementById('main-search').value;
            const city = document.getElementById('citySelect').value; // Берем выбранный город
            const lang = currentLang; // Берем текущий язык

            if (query.trim() !== "") {
                // Отправляем пользователя в каталог с тремя параметрами
                window.location.href = `catalog.html?query=${encodeURIComponent(query)}&city=${city}&lang=${lang}`;
            }
        }
    }

    window.onload = applyTranslations;
    </script>
</body>
</html>
<link rel="stylesheet" href="mobile.css">
