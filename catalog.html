<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Каталог - Мир Цветов</title>
    <style>
        @font-face {
            font-family: 'Benzin';
            src: url('fonts/benzin-semibold.otf') format('opentype');
        }

        :root { --pink: #FF007A; --light-pink: #FFD1E8; }
        body { font-family: sans-serif; margin: 0; background-color: #fff; }

        .header { display: flex; justify-content: space-between; padding: 15px 5%; align-items: center; border-bottom: 1px solid #eee; }
        .logo img { height: 85px; width: auto; object-fit: contain; }

        .nav-links { display: flex; align-items: center; gap: 10px; }

        .nav-links a, .lang-switch, .city-badge {
            text-decoration: none;
            color: var(--pink);
            font-family: 'Benzin', sans-serif;
            font-weight: bold;
            font-size: 13px;
            border: 1px solid var(--pink);
            padding: 7px 20px;
            border-radius: 50px;
            transition: 0.3s;
            background: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            text-transform: uppercase;
        }

        .nav-links a.active, .nav-links a:hover, .lang-switch:hover {
            background: var(--pink);
            color: white !important;
        }

        .catalog-header h1 {
            font-family: 'Benzin', sans-serif;
            background: var(--light-pink); color: var(--pink);
            text-align: center; padding: 12px; border-radius: 50px;
            margin: 30px auto; width: 75%; font-size: 22px; letter-spacing: 2px;
        }

        .layout { display: flex; padding: 0 5%; position: relative; gap: 20px; }

        .sidebar { width: 220px; flex-shrink: 0; }
        .sidebar h3 { font-family: 'Benzin', sans-serif; font-size: 16px; margin-bottom: 15px; margin-top: 25px; color: #333; text-transform: uppercase; }

        .price-filter { margin-bottom: 30px; width: 180px; }
        .range-slider-container { position: relative; height: 20px; margin-bottom: 15px; }
        .slider-track {
            position: absolute; width: 100%; height: 4px;
            background: var(--light-pink); border-radius: 2px; top: 8px; z-index: 1;
        }
        input[type="range"] { position: absolute; width: 100%; -webkit-appearance: none; background: none; pointer-events: none; top: 0; z-index: 2; margin: 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--pink); border: 2px solid white; pointer-events: auto; cursor: pointer; }

        .price-inputs { display: flex; align-items: center; justify-content: space-between; }
        .price-box { background: var(--light-pink); color: var(--pink); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }

        .filter-list { list-style: none; padding: 0; margin: 0; max-height: 400px; overflow-y: auto; }
        .filter-list li { margin-bottom: 10px; font-size: 13px; color: #444; display: flex; align-items: center; }
        .filter-list input { margin-right: 10px; accent-color: var(--pink); }

        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; flex-grow: 1; margin-right: 60px; margin-bottom: 50px;}
        .product-card { text-decoration: none; color: inherit; text-align: center; display: block; }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 15px; background: #f5f5f5; transition: 0.3s; }
        .product-card:hover img { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        .product-name { font-family: 'Benzin', sans-serif; font-size: 13px; font-weight: bold; margin-top: 15px; color: #333; min-height: 32px; display: flex; align-items: center; justify-content: center; }
        .product-price { font-size: 15px; color: var(--pink); margin-top: 5px; font-weight: bold; }

        .side-banner { position: absolute; right: 0; top: 0; background: var(--pink); color: white; width: 50px; height: 100%; border-radius: 25px 0 0 25px; display: flex; align-items: center; justify-content: center; }
        .side-banner span { font-family: 'Benzin', sans-serif; writing-mode: vertical-rl; transform: rotate(180deg); font-weight: bold; font-size: 14px; white-space: nowrap; letter-spacing: 1px; }
    </style>
</head>

        document.getElementById('f-eust').textContent = t.fEust;
        document.getElementById('f-lilii').textContent = t.fLilii;
        document.getElementById('f-diant').textContent = t.fDiant;
        document.getElementById('f-gvozd').textContent = t.fGvozd;
        document.getElementById('side-text').textContent = t.sideText;
        document.getElementById('langBtn').textContent = t.langBtn;
        document.getElementById('opt-astana').textContent = t.cities.astana;
        document.getElementById('opt-almaty').textContent = t.cities.almaty;
    }

    function slideOne() {
        if(parseInt(sliderTwo.value) - parseInt(sliderOne.value) <= 0){ sliderOne.value = sliderTwo.value; }
        displayValOne.textContent = sliderOne.value;
        render();
    }
    function slideTwo() {
        if(parseInt(sliderTwo.value) - parseInt(sliderOne.value) <= 0){ sliderTwo.value = sliderOne.value; }
        displayValTwo.textContent = sliderTwo.value;
        render();
    }

    function applyAISearch() {
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('query');
        if (!query) return;
        const lowerQuery = query.toLowerCase();
        const priceMatch = lowerQuery.match(/\d+/);
        if (priceMatch) {
            const targetPrice = parseInt(priceMatch[0]);
            if (targetPrice >= 5000 && targetPrice <= 250000) {
                sliderTwo.value = targetPrice;
                displayValTwo.textContent = targetPrice;
            }
        }
    }

    function render() {
    const city = document.getElementById('citySelect').value;
    const grid = document.getElementById('catalogGrid');
    const minP = parseInt(document.getElementById('slider-1').value);
    const maxP = parseInt(document.getElementById('slider-2').value);

    const activeFilters = Array.from(document.querySelectorAll('.filter-check:checked')).map(c => c.value.toLowerCase());
    const isHitOnly = document.getElementById('hits-filter') ? document.getElementById('hits-filter').checked : false;

    const hitsList = ["НЕЖНОСТЬ", "ИЗЫСКАННАЯ НЕЖНОСТЬ"];

    const filtered = flowerData[city].filter(f => {
        const matchesPrice = f.price >= minP && f.price <= maxP;
        const matchesCat = activeFilters.length === 0 || activeFilters.some(filter => f.cat.toLowerCase().includes(filter));
        const matchesHit = isHitOnly ? hitsList.includes(f.id) : true;
        return matchesPrice && matchesCat && matchesHit;
    });

    grid.innerHTML = filtered.map(f => {
        return `
            <div class="product-card">
                <img src="${f.img}" alt="${f.id}" loading="lazy">
                <div class="product-name">${translations[currentLang].flowers[f.id] || f.id}</div>
                <div class="product-price">${f.price.toLocaleString()} ₸</div>
            </div>
        `;
    }).join('');
}

    document.getElementById('citySelect').addEventListener('change', render);
    document.getElementById('hits-filter').addEventListener('change', render);
    document.querySelectorAll('.filter-check').forEach(ch => ch.addEventListener('change', render));

    window.onload = () => {
        applyTranslations();
        applyAISearch();
        render();
    };
</script>
</body>
</html>
